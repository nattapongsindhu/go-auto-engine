name: go-auto-engine-ai-system

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  analyze:
    runs-on: ubuntu-latest
    outputs:
      temp: ${{ steps.data.outputs.temp }}
      wind: ${{ steps.data.outputs.wind }}

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y jq

      - name: Fetch & analyze data
        id: data
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

          TEMP=$(jq '.current_weather.temperature' weather.json)
          WIND=$(jq '.current_weather.windspeed' weather.json)

          echo "temp=$TEMP" >> $GITHUB_OUTPUT
          echo "wind=$WIND" >> $GITHUB_OUTPUT

  decide:
    runs-on: ubuntu-latest
    needs: analyze
    outputs:
      state: ${{ steps.decision.outputs.state }}
      reason: ${{ steps.decision.outputs.reason }}

    steps:
      - name: AI decision
        id: decision
        run: |
          TEMP=${{ needs.analyze.outputs.temp }}

          if (( $(echo "$TEMP > 30" | bc -l) )); then
            STATE="WARNING"
            REASON="Too hot"
          elif (( $(echo "$TEMP < 10" | bc -l) )); then
            STATE="CRITICAL"
            REASON="Too cold"
          else
            STATE="HEALTHY"
            REASON="Normal"
          fi

          echo "state=$STATE" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT

  predict:
    runs-on: ubuntu-latest
    needs: analyze
    outputs:
      trend: ${{ steps.pred.outputs.trend }}

    steps:
      - uses: actions/checkout@v4

      - name: Install bc
        run: sudo apt-get install -y bc

      - name: Predict trend
        id: pred
        run: |
          TEMP=${{ needs.analyze.outputs.temp }}

          if [ ! -f history.txt ]; then
            echo "$TEMP" > history.txt
            TREND="NEW"
          else
            LAST=$(tail -n 1 history.txt)

            if (( $(echo "$TEMP > $LAST" | bc -l) )); then
              TREND="UP"
            elif (( $(echo "$TEMP < $LAST" | bc -l) )); then
              TREND="DOWN"
            else
              TREND="STABLE"
            fi

            echo "$TEMP" >> history.txt
          fi

          echo "trend=$TREND" >> $GITHUB_OUTPUT

  update:
    runs-on: ubuntu-latest
    needs: [analyze, decide, predict]

    steps:
      - uses: actions/checkout@v4

      - name: Generate graph
        run: |
          GRAPH=""
          for T in $(tail -n 10 history.txt); do
            BAR=$(printf "%0.s#" $(seq 1 ${T%.*}))
            GRAPH="$GRAPH\n$BAR"
          done

          echo "GRAPH<<EOF" >> $GITHUB_ENV
          echo -e "$GRAPH" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build README
        run: |
          TEMP=${{ needs.analyze.outputs.temp }}
          WIND=${{ needs.analyze.outputs.wind }}
          STATE=${{ needs.decide.outputs.state }}
          REASON=${{ needs.decide.outputs.reason }}
          TREND=${{ needs.predict.outputs.trend }}

          echo "# 🚀 Go Auto Engine AI System" > README.md
          echo "" >> README.md

          echo "## 🌡️ Live Data" >> README.md
          echo "- Temp: $TEMP °C" >> README.md
          echo "- Wind: $WIND km/h" >> README.md
          echo "" >> README.md

          echo "## 🤖 AI Decision" >> README.md
          echo "- State: $STATE" >> README.md
          echo "- Reason: $REASON" >> README.md
          echo "" >> README.md

          echo "## 📈 Prediction" >> README.md
          echo "- Trend: $TREND" >> README.md
          echo "" >> README.md

          echo "## 📊 Graph" >> README.md
          echo '```' >> README.md
          echo -e "$GRAPH" >> README.md
          echo '```' >> README.md
          echo "" >> README.md

          echo "## 🧠 System Architecture" >> README.md
          echo "Analyze → Decide → Predict → Update" >> README.md
          echo "" >> README.md

          echo "## 📜 History" >> README.md
          tail -n 5 history.txt >> README.md

          echo "" >> README.md
          echo "_Auto updated by AI agents_" >> README.md

      - name: Commit
        run: |
          git config user.name "ai-engine"
          git config user.email "ai@engine.com"
          git add .
          git commit -m "AI multi-agent update" || echo "no changes"
          git push
