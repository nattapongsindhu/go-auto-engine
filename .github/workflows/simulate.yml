name: ai-engine-balanced

on:
  schedule:
    - cron: '0 3 * * *'   # SAFE: run once per day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Fetch weather
      - name: Fetch weather
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

      # 2. Parse data
      - name: Parse data
        run: |
          TEMP=$(jq '.current_weather.temperature' weather.json)
          WIND=$(jq '.current_weather.windspeed' weather.json)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV

      # 3. Analyze
      - name: Analyze
        run: |
          if (( $(echo "$TEMP > 30" | bc -l) )); then
            STATUS="HOT"
          elif (( $(echo "$TEMP < 10" | bc -l) )); then
            STATUS="COLD"
          else
            STATUS="NORMAL"
          fi

          echo "STATUS=$STATUS" >> $GITHUB_ENV

      # 4. Predict
      - name: Predict
        run: |
          if [ "$STATUS" = "HOT" ]; then
            TREND="Cooling Soon"
          elif [ "$STATUS" = "COLD" ]; then
            TREND="Warming Soon"
          else
            TREND="Stable"
          fi

          echo "TREND=$TREND" >> $GITHUB_ENV

      # 5. Score
      - name: Score
        run: |
          SCORE=$(( (TEMP * 2) + WIND ))
          echo "SCORE=$SCORE" >> $GITHUB_ENV

      # 6. Save history
      - name: Save history
        run: |
          echo "$(date),$TEMP" >> temp.csv

      # 7. Generate graph
      - name: Generate graph
        run: |
          echo "<svg width='300' height='100'>" > graph.svg
          i=0
          while IFS=, read -r time temp; do
            x=$((i*10))
            y=$((100 - temp))
            echo "<circle cx='$x' cy='$y' r='2' fill='cyan' />" >> graph.svg
            i=$((i+1))
          done < temp.csv
          echo "</svg>" >> graph.svg

      # 8. Build JSON
      - name: Build JSON
        run: |
          echo "{
            \"temp\": $TEMP,
            \"wind\": $WIND,
            \"status\": \"$STATUS\",
            \"trend\": \"$TREND\",
            \"score\": $SCORE,
            \"updated\": \"$(date)\"
          }" > data.json

      # 9. Commit changes
      - name: Commit & push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "auto update" || echo "no changes"
          git push
