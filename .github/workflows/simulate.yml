name: go-auto-engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Fetch weather
      - name: Fetch weather
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

      # ✅ Parse (safe)
      - name: Parse data
        run: |
          TEMP=$(jq '.current_weather.temperature' weather.json)
          WIND=$(jq '.current_weather.windspeed' weather.json)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV

      # ✅ Logic (simple)
      - name: Logic
        run: |
          if [ "$TEMP" -gt 30 ]; then
            STATUS="HOT"
          else
            STATUS="OK"
          fi

          echo "STATUS=$STATUS" >> $GITHUB_ENV

      # ✅ CSV (กันพัง)
      - name: Update CSV
        run: |
          touch temp.csv
          echo "$TEMP" >> temp.csv

      # ✅ Graph (simple SVG)
      - name: Generate graph
        run: |
          echo "<svg xmlns='http://www.w3.org/2000/svg' width='400' height='100'>
          <rect width='400' height='100' fill='#0f172a'/>
          <text x='20' y='60' fill='#22c55e' font-size='24'>
          Temp: $TEMP °C
          </text>
          </svg>" > graph.svg

      # ✅ JSON
      - name: Update JSON
        run: |
          echo "{
            \"temp\": $TEMP,
            \"wind\": $WIND,
            \"status\": \"$STATUS\"
          }" > data.json

      # 🔥 FIX สำคัญที่สุด (กัน exit 128)
      - name: Commit safely
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "auto update"
          git pull --rebase origin main
          git push origin main
