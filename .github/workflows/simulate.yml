name: go-auto-engine-ai

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Fix jq (สำคัญมาก)
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install jq -y

      # 3. Fetch weather
      - name: Fetch weather
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

      # 4. Parse data
      - name: Parse weather
        run: |
          TEMP=$(jq '.current_weather.temperature' weather.json)
          WIND=$(jq '.current_weather.windspeed' weather.json)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV

      # 5. Save history
      - name: Save history
        run: |
          echo "$TEMP" >> temp.csv
          tail -n 20 temp.csv > temp.tmp && mv temp.tmp temp.csv

      # 6. Trend analysis
      - name: Trend analysis
        run: |
          COUNT=$(wc -l < temp.csv)

          if [ "$COUNT" -ge 5 ]; then
            AVG=$(tail -n 5 temp.csv | awk '{sum+=$1} END {print sum/NR}')
          else
            AVG=$TEMP
          fi

          echo "AVG=$AVG" >> $GITHUB_ENV

      # 7. AI Prediction
      - name: AI Prediction
        run: |
          if (( $(echo "$TEMP > $AVG" | bc -l) )); then
            TREND="📈 Rising"
            PREDICT="🔥 Temperature increasing"
          elif (( $(echo "$TEMP < $AVG" | bc -l) )); then
            TREND="📉 Falling"
            PREDICT="❄️ Cooling down"
          else
            TREND="➖ Stable"
            PREDICT="😐 No major change"
          fi

          echo "TREND=$TREND" >> $GITHUB_ENV
          echo "PREDICT=$PREDICT" >> $GITHUB_ENV

      # 8. System decision
      - name: Decision
        run: |
          if (( $(echo "$TEMP > 30" | bc -l) )); then
            STATUS="⚠️ WARNING"
            INSIGHT="Too hot"
          elif (( $(echo "$TEMP < 10" | bc -l) )); then
            STATUS="🔴 CRITICAL"
            INSIGHT="Too cold"
          else
            STATUS="🟢 HEALTHY"
            INSIGHT="Normal"
          fi

          echo "STATUS=$STATUS" >> $GITHUB_ENV
          echo "INSIGHT=$INSIGHT" >> $GITHUB_ENV

      # 9. Generate graph (ASCII)
      - name: Generate graph
        run: |
          GRAPH=""
          for T in $(tail -n 10 temp.csv); do
            BAR=$(printf "%0.s#" $(seq 1 ${T%.*}))
            GRAPH="$GRAPH\n$BAR"
          done

          echo -e "GRAPH=$GRAPH" >> $GITHUB_ENV

      # 10. Generate README
      - name: Update README
        run: |
          echo "# 🚀 Go Auto Engine Dashboard" > README.md
          echo "" >> README.md

          echo "## 📊 Live Data" >> README.md
          echo "- 🌡 Temperature: $TEMP°C" >> README.md
          echo "- 💨 Wind: $WIND km/h" >> README.md
          echo "" >> README.md

          echo "## 🤖 AI Analysis" >> README.md
          echo "- Status: $STATUS" >> README.md
          echo "- Insight: $INSIGHT" >> README.md
          echo "- Trend: $TREND" >> README.md
          echo "- Prediction: $PREDICT" >> README.md
          echo "- Updated: $(date)" >> README.md
          echo "" >> README.md

          echo "## 📈 Temperature Graph" >> README.md
          echo '```' >> README.md
          echo -e "$GRAPH" >> README.md
          echo '```' >> README.md

      # 11. Commit
      - name: Commit
        run: |
          git config user.name "auto-engine-bot"
          git config user.email "bot@auto.com"
          git add .
          git commit -m "🤖 AI prediction update" || echo "no changes"
          git push
