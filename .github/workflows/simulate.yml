name: go-auto-engine-safe

on:
  schedule:
    - cron: "0 */6 * * *"   # ทุก 6 ชั่วโมง (วันละ 4 ครั้ง)
  workflow_dispatch:

concurrency:
  group: safe-engine
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y jq

      - name: Fetch weather
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

          TEMP=$(jq '.current_weather.temperature | floor' weather.json)
          WIND=$(jq '.current_weather.windspeed | floor' weather.json)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV

      - name: Decision
        run: |
          if [ "$TEMP" -gt 30 ]; then
            STATUS="WARNING"
          elif [ "$TEMP" -lt 10 ]; then
            STATUS="CRITICAL"
          else
            STATUS="HEALTHY"
          fi

          echo "STATUS=$STATUS" >> $GITHUB_ENV

      - name: Update README
        run: |
          echo "# 🚀 SAFE AI DASHBOARD" > README.md
          echo "" >> README.md
          echo "## 🌡 Data" >> README.md
          echo "- Temp: $TEMP °C" >> README.md
          echo "- Wind: $WIND km/h" >> README.md
          echo "" >> README.md
          echo "## 🤖 Status" >> README.md
          echo "- $STATUS" >> README.md
          echo "- Updated: $(date)" >> README.md

      - name: Commit (SAFE)
        run: |
          git config user.name "safe-bot"
          git config user.email "safe@bot.com"

          git add README.md

          # commit เฉพาะมีการเปลี่ยน
          git diff --cached --quiet || git commit -m "safe update"

          git push
