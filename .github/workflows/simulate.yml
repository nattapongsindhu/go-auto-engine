name: AI Engine Balanced

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch weather
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

      - name: Parse data
        run: |
          TEMP=$(jq '.current_weather.temperature' weather.json)
          WIND=$(jq '.current_weather.windspeed' weather.json)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV

      - name: AI logic
        run: |
          if (( $(echo "$TEMP > 30" | bc -l) )); then
            STATUS="WARNING"
            SCORE=60
          elif (( $(echo "$TEMP < 10" | bc -l) )); then
            STATUS="CRITICAL"
            SCORE=30
          else
            STATUS="HEALTHY"
            SCORE=90
          fi

          echo "STATUS=$STATUS" >> $GITHUB_ENV
          echo "SCORE=$SCORE" >> $GITHUB_ENV

      - name: Update CSV
        run: |
          echo "$(date +%s),$TEMP" >> temp.csv

      - name: Generate PNG graph
        run: |
          sudo apt-get install -y gnuplot

          echo "
          set terminal png size 800,400
          set output 'graph.png'
          set title 'Temperature History'
          set xlabel 'Time'
          set ylabel 'Temp'
          plot 'temp.csv' using 1:2 with lines
          " > plot.gp

          gnuplot plot.gp

      - name: Update JSON
        run: |
          echo "{
            \"temp\": $TEMP,
            \"wind\": $WIND,
            \"status\": \"$STATUS\",
            \"trend\": \"Stable\",
            \"score\": $SCORE,
            \"updated\": \"$(date)\"
          }" > data.json

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "auto update" || echo "no changes"
          git push
