name: go-auto-engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write   # 🔥 ตัวนี้สำคัญมาก

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch weather
        run: |
          curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

      - name: Parse
        run: |
          TEMP=$(jq '.current_weather.temperature' weather.json)
          WIND=$(jq '.current_weather.windspeed' weather.json)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "WIND=$WIND" >> $GITHUB_ENV

      - name: Logic
        run: |
          if [ "$TEMP" -gt 30 ]; then
            STATUS="HOT"
          else
            STATUS="OK"
          fi

          echo "STATUS=$STATUS" >> $GITHUB_ENV

      - name: Update files
        run: |
          echo "$TEMP" >> temp.csv

          echo "<svg xmlns='http://www.w3.org/2000/svg' width='400' height='100'>
          <text x='20' y='50'>Temp: $TEMP</text>
          </svg>" > graph.svg

          echo "{
            \"temp\": $TEMP,
            \"wind\": $WIND,
            \"status\": \"$STATUS\"
          }" > data.json

      # 🔥 FIX จริงอยู่ตรงนี้
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add .

          git commit -m "auto update" || echo "no change"

          git push
