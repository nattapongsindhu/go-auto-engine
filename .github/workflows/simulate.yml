name: go-auto-engine

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Fetch weather data
    - name: Fetch weather (Open-Meteo)
      run: |
        curl -s "https://api.open-meteo.com/v1/forecast?latitude=34.05&longitude=-118.24&current_weather=true" > weather.json

    # 3. Parse data
    - name: Parse weather
      run: |
        TEMP=$(cat weather.json | jq '.current_weather.temperature')
        WIND=$(cat weather.json | jq '.current_weather.windspeed')

        echo "TEMP=$TEMP" >> $GITHUB_ENV
        echo "WIND=$WIND" >> $GITHUB_ENV

    # 4. AI Decision Logic
    - name: AI Decision
      run: |
        if (( $(echo "$TEMP > 30" | bc -l) )); then
          echo "STATUS=WARNING" >> $GITHUB_ENV
          echo "STATE=🟡" >> $GITHUB_ENV
          echo "REASON=Too hot" >> $GITHUB_ENV
        elif (( $(echo "$TEMP < 10" | bc -l) )); then
          echo "STATUS=CRITICAL" >> $GITHUB_ENV
          echo "STATE=🔴" >> $GITHUB_ENV
          echo "REASON=Too cold" >> $GITHUB_ENV
        else
          echo "STATUS=HEALTHY" >> $GITHUB_ENV
          echo "STATE=🟢" >> $GITHUB_ENV
          echo "REASON=Good weather" >> $GITHUB_ENV
        fi

    # 5. Load history
    - name: Load history
      run: |
        if [ -f history.txt ]; then
          HISTORY=$(cat history.txt)
        else
          HISTORY=""
        fi

        NEW_HISTORY="$STATE $HISTORY"
        NEW_HISTORY=$(echo $NEW_HISTORY | cut -d ' ' -f1-10)

        echo "$NEW_HISTORY" > history.txt
        echo "NEW_HISTORY=$NEW_HISTORY" >> $GITHUB_ENV

    # 6. Trend analysis
    - name: Analyze trend
      run: |
        COUNT_GREEN=$(echo "$NEW_HISTORY" | grep -o "🟢" | wc -l)
        COUNT_RED=$(echo "$NEW_HISTORY" | grep -o "🔴" | wc -l)

        if [ "$COUNT_RED" -gt "$COUNT_GREEN" ]; then
          TREND="⚠️ System unstable"
        else
          TREND="✅ System stable"
        fi

        echo "TREND=$TREND" >> $GITHUB_ENV

    # 7. Generate README Dashboard
    - name: Generate README
      run: |
        echo "# 🚀 Go Auto Engine" > README.md
        echo "" >> README.md

        echo "## 🌐 Real Weather Data" >> README.md
        echo "- Temperature: ${TEMP}°C" >> README.md
        echo "- Wind Speed: ${WIND} km/h" >> README.md
        echo "" >> README.md

        echo "## 🧠 AI Analysis" >> README.md
        echo "- Status: $STATUS $STATE" >> README.md
        echo "- Insight: $REASON" >> README.md
        echo "- Trend: $TREND" >> README.md
        echo "- Time: $(date)" >> README.md
        echo "" >> README.md

        echo "## 📊 Trend Chart" >> README.md
        echo '```mermaid' >> README.md
        echo "graph LR" >> README.md

        COUNT=1
        for item in $NEW_HISTORY; do
          echo "S$COUNT[$item] -->" >> README.md
          COUNT=$((COUNT+1))
        done

        echo "END" >> README.md
        echo '```' >> README.md

        echo "" >> README.md
        echo "## 📜 History" >> README.md
        echo "$NEW_HISTORY" >> README.md

    # 8. Commit changes
    - name: Commit & push
      run: |
        git config user.name "auto-engine-bot"
        git config user.email "bot@auto-engine.com"
        git add README.md history.txt
        git commit -m "auto update dashboard" || echo "no changes"
        git push
