<!DOCTYPE html>
<html>
<head>
  <title>Go Auto Engine</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0b1a2a;
      color: white;
      font-family: Arial;
      text-align: center;
    }
  </style>
</head>

<body>

<h1>🚀 Go Auto Engine</h1>
<p>Analyze → Predict → Score → Decide</p>

<div id="data">Loading...</div>

<canvas id="chart" width="800" height="300"></canvas>

<script>
async function load() {
  const res = await fetch("./data.json");
  const d = await res.json();

  document.getElementById("data").innerHTML = `
    🌡 Temp: ${d.temp}°C <br>
    💨 Wind: ${d.wind} km/h <br>
    🧠 Status: ${d.status} <br>
    📈 Trend: ${d.trend} <br>
    🎯 Score: ${d.score}
  `;

  const csv = await fetch("./temp.csv");
  const text = await csv.text();

  const rows = text.trim().split("\n").slice(-10);

  const labels = rows.map(r => r.split(",")[0]);
  const values = rows.map(r => r.split(",")[1]);

  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Temperature",
        data: values
      }]
    }
  });
}

load();
</script>

</body>
</html>
