<!DOCTYPE html>
<html>
<head>
  <title>AI Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      margin: 10px;
      border-radius: 12px;
    }
    h1 { color: #38bdf8; }
  </style>
</head>
<body>

<h1>🚀 AI Monitoring Dashboard</h1>

<div class="card" id="data">Loading...</div>

<script>
async function loadData() {
  const res = await fetch('./data.json');
  const d = await res.json();

  document.getElementById('data').innerHTML = `
    🌡 Temperature: ${d.temp} °C <br><br>
    💨 Wind: ${d.wind} km/h <br><br>
    🤖 Status: ${d.status} <br><br>
    📈 Trend: ${d.trend} <br><br>
    🧮 Score: ${d.score} / 100 <br><br>
    ⏱ Updated: ${d.updated}
  `;
}

loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
