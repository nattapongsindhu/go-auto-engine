<!DOCTYPE html>
<html>
<head>
  <title>go-auto-engine</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#0f172a;color:white;text-align:center;padding:40px">

<h1>🚀 go-auto-engine</h1>
<p>Analyze → Predict → Score → Decide</p>
<div id="data">Loading...</div>

<canvas id="chart" width="400" height="200"></canvas>

<script>
let chart;

async function loadData() {
  const res = await fetch('./data.json');
  const d = await res.json();

  document.getElementById("data").innerHTML = `
    🌡 Temp: ${d.temp}°C <br>
    💨 Wind: ${d.wind} km/h <br>
    🤖 Status: ${d.status} <br>
    📈 Trend: ${d.trend} <br>
    🎯 Score: ${d.score}
  `;
}

async function loadChart() {
  const res = await fetch('./temp.csv');
  const text = await res.text();

  const temps = text.trim().split("\n").map(x => parseInt(x.split(",")[1]));

  new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels: temps.map((_,i)=>i),
      datasets: [{
        label: 'Temperature',
        data: temps
      }]
    }
  });
}

loadData();
loadChart();
</script>

</body>
</html>
