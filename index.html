<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LA Weather Automet</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b1a2a;
      color: #e0f0ff;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      transition: opacity 0.3s;
    }

    body.loading { opacity: 0.6; }

    h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .subtitle { color: #7ab; font-size: 0.9rem; margin-bottom: 2rem; }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 700px;
    }

    .card {
      background: #0f2840;
      border: 1px solid #1e3a5f;
      border-radius: 10px;
      padding: 1rem 1.5rem;
      min-width: 130px;
      flex: 1;
      text-align: center;
    }

    .card .label { font-size: 0.75rem; color: #7ab; text-transform: uppercase; letter-spacing: 1px; }
    .card .value { font-size: 1.6rem; font-weight: bold; margin-top: 0.25rem; color: #00ffcc; }
    .card .unit  { font-size: 0.75rem; color: #7ab; }

    .status-OK   { color: #00ffcc; }
    .status-WARM { color: #ffcc00; }
    .status-HOT  { color: #ff4444; }
    .status-COLD { color: #44aaff; }

    .chart-wrap {
      width: 100%;
      max-width: 700px;
      background: #0f2840;
      border: 1px solid #1e3a5f;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .chart-empty {
      text-align: center;
      color: #456;
      padding: 2rem;
      font-size: 0.85rem;
      display: none;
    }

    .health {
      font-size: 0.7rem;
      color: #456;
      margin-top: 0.25rem;
    }

    .health.ok   { color: #00cc88; }
    .health.warn { color: #ffaa00; }

    .updated {
      font-size: 0.75rem;
      color: #7ab;
      margin-top: 0.5rem;
    }

    #error-msg {
      color: #f66;
      display: none;
      margin-top: 1rem;
      font-size: 0.85rem;
      max-width: 500px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- v4 -->
<h1>🚀 LA Weather Automet</h1>
<p class="subtitle">Fetch → Analyze → Score → Visualize</p>

<div class="cards">
  <div class="card">
    <div class="label">🌡 Temperature</div>
    <div class="value" id="val-temp">—</div>
    <div class="unit">°C</div>
  </div>
  <div class="card">
    <div class="label">💨 Wind</div>
    <div class="value" id="val-wind">—</div>
    <div class="unit">km/h</div>
  </div>
  <div class="card">
    <div class="label">🧠 Status</div>
    <div class="value" id="val-status">—</div>
    <div class="unit" id="val-trend">—</div>
  </div>
  <div class="card">
    <div class="label">🎯 Score</div>
    <div class="value" id="val-score">—</div>
    <div class="unit">/ 100</div>
  </div>
</div>

<div class="chart-wrap">
  <canvas id="chart"></canvas>
  <div class="chart-empty" id="chart-empty">No data available</div>
</div>

<p class="updated" id="updated-at"></p>
<p class="health" id="pipeline-health"></p>
<p id="error-msg" style="display:none"></p>

<script>
let chartInstance = null;
const ALLOWED_STATUS = ["OK", "WARM", "HOT", "COLD"];

function setError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = "⚠️ " + msg;
  el.style.display = "block";
}

function clearError() {
  document.getElementById("error-msg").style.display = "none";
}

async function load() {
  document.body.classList.add("loading");

  try {
    // --- data.json with cache bypass ---
    const res = await fetch("./data.json", { cache: "no-store" });
    if (!res.ok) throw new Error("data.json fetch failed: " + res.status);
    const d = await res.json();

    // schema validation
    if (typeof d.temp !== "number") throw new Error("Invalid data: temp missing");
    if (typeof d.wind !== "number") throw new Error("Invalid data: wind missing");

    document.getElementById("val-temp").textContent  = d.temp;
    document.getElementById("val-wind").textContent  = d.wind;
    document.getElementById("val-trend").textContent = d.trend ?? "";
    document.getElementById("val-score").textContent = d.score ?? "—";

    // safe status class
    const status  = ALLOWED_STATUS.includes(d.status) ? d.status : "OK";
    const statusEl = document.getElementById("val-status");
    statusEl.textContent = d.status ?? "—";
    statusEl.className   = "value status-" + status;

    // pipeline health check
    if (d.updated) {
      const updated   = new Date(d.updated);
      const ageHours  = (Date.now() - updated.getTime()) / 3600000;
      const healthEl  = document.getElementById("pipeline-health");
      const updatedEl = document.getElementById("updated-at");

      updatedEl.textContent = "Last updated: " + updated.toLocaleString();

      if (ageHours < 7) {
        healthEl.textContent  = "● Pipeline healthy";
        healthEl.className    = "health ok";
      } else {
        healthEl.textContent  = "⚠ Pipeline may be stale (" + Math.round(ageHours) + "h ago)";
        healthEl.className    = "health warn";
      }
    }

    // --- temp.csv with cache bypass ---
    const csvRes = await fetch("./temp.csv", { cache: "no-store" });
    if (!csvRes.ok) throw new Error("temp.csv fetch failed: " + csvRes.status);
    const text = await csvRes.text();

    const rows   = text.trim().split("\n").slice(1); // skip header
    const last20 = rows.slice(-20);

    const labels = last20.map(r => {
      const ts = r.split(",")[0];
      try { return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }
      catch { return ts; }
    });

    // fix: filter nulls + validate parts
    const values = last20.map(r => {
      const parts = r.split(",");
      if (parts.length < 2) return null;
      const v = parseFloat(parts[1]);
      return isNaN(v) ? null : v;
    }).filter(v => v !== null);

    // fix: guard against empty dataset
    const emptyEl = document.getElementById("chart-empty");
    if (!values.length) {
      emptyEl.style.display = "block";
      console.warn("No valid data for chart");
      document.body.classList.remove("loading");
      return;
    }
    emptyEl.style.display = "none";

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Temperature (°C)",
          data: values,
          borderColor: "#00ffcc",
          backgroundColor: "rgba(0,255,204,0.1)",
          tension: 0.4,
          pointRadius: 3,
          fill: true,
          spanGaps: true
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: "#aac" } } },
        scales: {
          x: { ticks: { color: "#7ab", maxRotation: 45 }, grid: { color: "#1e3a5f" } },
          y: { ticks: { color: "#7ab" },                  grid: { color: "#1e3a5f" } }
        }
      }
    });

    clearError();

  } catch (err) {
    console.error(err);
    setError(err.message);
  } finally {
    document.body.classList.remove("loading");
  }
}

load();
setInterval(load, 10 * 60 * 1000);
</script>

</body>
</html>
